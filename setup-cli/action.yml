name: 'Setup Metaplay CLI'
description: 'Set up the Metaplay CLI and optionally sign in with the provided machine user credentials'
inputs:
  version:
    description: 'Metaplay CLI version to install'
    required: false
    default: 'latest'
  login:
    description: 'Whether to authenticate to Metaplay cloud after installing the CLI'
    required: false
    default: 'true'
  credentials:
    description: 'Metaplay machine user credentials (required when login is true)'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install Metaplay CLI (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          bash <(curl -fsSL --retry 10 --retry-all-errors --retry-max-time 60 https://metaplay.github.io/cli/install.sh)
        else
          bash <(curl -fsSL --retry 10 --retry-all-errors --retry-max-time 60 https://metaplay.github.io/cli/install.sh) --version ${{ inputs.version }}
        fi

    - name: Add CLI to PATH (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Install Metaplay CLI (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if ("${{ inputs.version }}" -ne "latest") {
          $env:METAPLAY_VERSION = "${{ inputs.version }}"
        }
        irm https://metaplay.github.io/cli/install.ps1 | iex

    - name: Add CLI to PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Add-Content $env:GITHUB_PATH "$env:LOCALAPPDATA\metaplay\bin"

    - name: Validate inputs
      if: inputs.login == 'true' && inputs.credentials == ''
      shell: bash
      run: |
        echo "::error::'credentials' input is required when 'login' is true. Either provide 'credentials' to authenticate, or set 'login: false' to install the CLI without authentication (e.g., for running tests)."
        exit 1

    - name: Authenticate to Metaplay cloud
      if: inputs.login == 'true'
      shell: bash
      env:
        METAPLAY_CREDENTIALS: ${{ inputs.credentials }}
      run: metaplay auth machine-login
